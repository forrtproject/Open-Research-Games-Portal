name: Deploy Open Research Games Portal Application

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  workflow_run:
    workflows: ["Weekly Data Processing"]
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: shinyapps-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Only run if workflow_run succeeded OR if triggered manually/on schedule
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      # Helpful defaults for renv + GitHub Actions
      RENV_CONFIG_CACHE_ENABLED: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R (match renv.lock)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          install-r: true
          use-public-rspm: true
          Ncpus: "2"
          http-user-agent: "release"

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gfortran \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libpcre2-dev \
            libicu-dev \
            libpng-dev \
            libjpeg-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libsodium-dev

      - name: Ensure renv matches this R (avoid bad PPM binaries)
        run: |
          set -euo pipefail
          Rscript --vanilla <<'RS'
          target <- Sys.getenv("RENV_VERSION_PIN", unset = "1.1.8")

          ok <- function() {
            if (!requireNamespace("renv", quietly = TRUE)) return(FALSE)
            tryCatch(
              {
                suppressPackageStartupMessages(loadNamespace("renv"))
                TRUE
              },
              error = function(e) FALSE
            )
          }

          if (ok()) {
            message("renv already loadable (version ", packageVersion("renv"), ")")
            quit(status = 0)
          }

          message("Installing renv ", target, " from CRAN source (avoids incompatible PPM binaries for renv itself) ...")
          try(remove.packages("renv"), silent = TRUE)

          archive_url <- paste0(
            "https://cran.r-project.org/src/contrib/Archive/renv/renv_",
            target,
            ".tar.gz"
          )
          ok_install <- tryCatch(
            {
              install.packages(archive_url, repos = NULL, type = "source")
              ok()
            },
            error = function(e) FALSE
          )

          if (!ok_install) {
            message("Archive install failed; falling back to CRAN current renv source ...")
            install.packages("renv", repos = "https://cloud.r-project.org", type = "source")
          }

          if (!ok()) stop("Failed to install a loadable renv for this R version")
          RS

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2
        with:
          # Must be a valid R expression (see r-lib/actions setup-renv README)
          profile: 'NULL'
          cache-version: 1
          # Save renv cache even if restore fails mid-way (helps debugging flaky installs)
          bypass-cache: never

      - name: Verify shinyapps.io secrets are set
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.SHINYAPPS_TOKEN }}" ]; then
            echo "ERROR: SHINYAPPS_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SHINYAPPS_SECRET }}" ]; then
            echo "ERROR: SHINYAPPS_SECRET is not set"
            exit 1
          fi
          echo "All required secrets are set ✓"

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SHINYAPPS_NAME: open-research-games-portal
          SHINYAPPS_ACCOUNT: forrtapps
          USE_BUNDLED_LIBUV: "1"
        run: |
          set -euo pipefail
          Rscript --vanilla <<'RS'
          source("renv/activate.R")

          rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )

          rsconnect::deployApp(
            appName = Sys.getenv("SHINYAPPS_NAME"),
            appDir = ".",
            # Let shinyapps.io manage R package installation on the server when needed.
            # The repo still pins versions via renv.lock for reproducible CI + bundling.
            envManagement = "auto"
          )
          RS
