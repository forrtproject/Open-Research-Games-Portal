name: Deploy Open Research Games Portal Application

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allows manual triggering
  workflow_run:
    workflows: ["Weekly Data Processing"]
    types:
      - completed 

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if workflow_run succeeded OR if triggered manually/on schedule
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4' # Use a specific R version for stability
          install-r: true
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libuv1-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Restore R packages (renv)
        run: |
          set -euo pipefail
          . /etc/os-release
          export RSPM="https://packagemanager.posit.co/cran/__linux__/${VERSION_CODENAME}/latest"
          # `setup-r` may set RENV_CONFIG_REPOS_OVERRIDE; keep it aligned with RSPM
          # so renv doesn't try to resolve against an unexpected repo set.
          export RENV_CONFIG_REPOS_OVERRIDE="${RSPM}"
          Rscript --vanilla <<'RS'
          rspm <- Sys.getenv("RSPM")
          if (!nzchar(rspm)) stop("RSPM env var is empty")

          options(
            repos = c(RSPM = rspm, CRAN = "https://cloud.r-project.org"),
            Ncpus = max(1L, parallel::detectCores() - 1L)
          )

          Sys.setenv(USE_BUNDLED_LIBUV = "1")

          if (!requireNamespace("renv", quietly = TRUE)) {
            # Let R choose the best available package type for this platform/repos.
            install.packages("renv", repos = getOption("repos"), dependencies = TRUE)
          }
          if (!requireNamespace("renv", quietly = TRUE)) {
            stop("Failed to install/load renv")
          }

          renv::restore(prompt = FALSE, rebuild = "never")
          RS
      
      # This repository is a Shiny app (not an R package), so `DESCRIPTION`
      # is typically absent. If you later add one, prefer managing deps via renv.

      - name: Verify secrets are set
        run: |
          if [ -z "${{ secrets.SHINYAPPS_TOKEN }}" ]; then echo "ERROR: SHINYAPPS_TOKEN is not set"; exit 1; fi
          if [ -z "${{ secrets.SHINYAPPS_SECRET }}" ]; then echo "ERROR: SHINYAPPS_SECRET is not set"; exit 1; fi
          echo "All required secrets are set ✓"

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SHINYAPPS_NAME: open-research-games-portal
          SHINYAPPS_ACCOUNT: forrtapps
        run: |
          Rscript --vanilla <<'RS'
          source("renv/activate.R")
          rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          )
          rsconnect::deployApp(
            appName = Sys.getenv("SHINYAPPS_NAME"),
            appDir = ".",
            envManagement = "none"
          )
          RS
          