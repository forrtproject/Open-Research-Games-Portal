name: Weekly Data Processing

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly at 00:00 UTC every Sunday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-data-processing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  data-processing:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      RENV_CONFIG_CACHE_ENABLED: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Backwards compatible with a common typo; prefer ORGP_DP_TOKEN.
          token: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }}

      - name: Set up R (match renv.lock)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          install-r: true
          use-public-rspm: true
          Ncpus: "2"
          http-user-agent: "release"

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gfortran \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libpcre2-dev \
            libicu-dev \
            libpng-dev \
            libjpeg-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libsodium-dev

      - name: Ensure renv matches this R (avoid bad PPM binaries)
        run: |
          set -euo pipefail
          unset RENV_CONFIG_REPOS_OVERRIDE || true
          export CRAN="https://cloud.r-project.org"
          Rscript --vanilla <<'RS'
          options(repos = c(CRAN = Sys.getenv("CRAN")), Ncpus = max(1L, parallel::detectCores() - 1L))

          can_load_renv <- function() {
            tryCatch(
              {
                suppressPackageStartupMessages(loadNamespace("renv"))
                TRUE
              },
              error = function(e) FALSE
            )
          }

          if (can_load_renv()) {
            message("renv is already loadable: ", packageVersion("renv"))
            quit(status = 0)
          }

          message("renv not loadable; reinstalling renv from CRAN source ...")
          tryCatch(
            utils::remove.packages("renv", lib = .libPaths()[1]),
            error = function(e) invisible(NULL)
          )
          install.packages("renv", repos = getOption("repos"), type = "source")

          if (!can_load_renv()) {
            stop("renv still not loadable after source reinstall")
          }

          message("renv OK: ", packageVersion("renv"))
          RS

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2
        with:
          profile: 'NULL'
          cache-version: 1
          bypass-cache: never

      - name: Run data processing
        env:
          GITHUB_PAT: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }}
        run: |
          set -euo pipefail
          Rscript --vanilla <<'RS'
          source("renv/activate.R")
          source("scripts/Open-Research-Games-Portal.R")
          RS

      - name: Commit and push updated data
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/open_research_games.json
          git diff --staged --quiet || git commit -m "Update games data [automated]"
          git push
