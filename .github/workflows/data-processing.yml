name: Weekly Data Processing

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly at 00:00 UTC every Sunday
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Backwards compatible with a common typo; prefer ORGP_DP_TOKEN.
          token: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4' # Use a specific R version for stability
          install-r: true
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Restore R packages (renv)
        run: |
          set -euo pipefail
          . /etc/os-release
          export RSPM="https://packagemanager.posit.co/cran/__linux__/${VERSION_CODENAME}/latest"
          Rscript --vanilla <<'RS'
          options(
            repos = c(
              RSPM = Sys.getenv("RSPM"),
              CRAN = "https://cloud.r-project.org"
            ),
            Ncpus = max(1L, parallel::detectCores() - 1L)
          )

          Sys.setenv(USE_BUNDLED_LIBUV = "1")

          install_pkg <- function(pkg) {
            if (requireNamespace(pkg, quietly = TRUE)) return(invisible(TRUE))
            tryCatch(
              {
                install.packages(pkg, type = "binary")
                requireNamespace(pkg, quietly = TRUE)
              },
              error = function(e) FALSE
            )
            if (!requireNamespace(pkg, quietly = TRUE)) {
              install.packages(pkg, type = "source")
            }
            invisible(TRUE)
          }

          install_pkg("renv")

          renv::restore(prompt = FALSE, rebuild = "never")
          RS

      - name: Run data processing
        run: |
          Rscript --vanilla scripts/Open-Research-Games-Portal.R
        env:
          GITHUB_PAT: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }} # For googlesheets4 if needed

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/open_research_games.json
          git diff --staged --quiet || git commit -m "Update games data [automated]"
          git push
