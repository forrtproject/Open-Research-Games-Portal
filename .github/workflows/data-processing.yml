name: Weekly Data Processing

on:
  schedule:
    - cron: "0 0 * * 0" # Runs weekly at 00:00 UTC every Sunday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-data-processing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  data-processing:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      RENV_CONFIG_CACHE_ENABLED: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Backwards compatible with a common typo; prefer ORGP_DP_TOKEN.
          token: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }}

      - name: Set up R (match renv.lock)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          install-r: true
          use-public-rspm: true
          Ncpus: "2"
          http-user-agent: "release"

      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gfortran \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgit2-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libpcre2-dev \
            libicu-dev \
            libpng-dev \
            libjpeg-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libsodium-dev

      - name: Ensure renv matches this R (avoid bad PPM binaries)
        run: |
          set -euo pipefail
          Rscript --vanilla <<'RS'
          target <- Sys.getenv("RENV_VERSION_PIN", unset = "1.1.8")

          ok <- function() {
            if (!requireNamespace("renv", quietly = TRUE)) return(FALSE)
            tryCatch(
              {
                suppressPackageStartupMessages(loadNamespace("renv"))
                TRUE
              },
              error = function(e) FALSE
            )
          }

          if (ok()) {
            message("renv already loadable (version ", packageVersion("renv"), ")")
            quit(status = 0)
          }

          message("Installing renv ", target, " from CRAN source (avoids incompatible PPM binaries for renv itself) ...")
          try(remove.packages("renv"), silent = TRUE)

          archive_url <- paste0(
            "https://cran.r-project.org/src/contrib/Archive/renv/renv_",
            target,
            ".tar.gz"
          )
          ok_install <- tryCatch(
            {
              install.packages(archive_url, repos = NULL, type = "source")
              ok()
            },
            error = function(e) FALSE
          )

          if (!ok_install) {
            message("Archive install failed; falling back to CRAN current renv source ...")
            install.packages("renv", repos = "https://cloud.r-project.org", type = "source")
          }

          if (!ok()) stop("Failed to install a loadable renv for this R version")
          RS

      - name: Restore R packages (renv)
        uses: r-lib/actions/setup-renv@v2
        with:
          profile: 'NULL'
          cache-version: 1
          bypass-cache: never

      - name: Run data processing
        env:
          GITHUB_PAT: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }}
        run: |
          set -euo pipefail
          Rscript --vanilla <<'RS'
          source("renv/activate.R")
          source("scripts/Open-Research-Games-Portal.R")
          RS

      - name: Commit and push updated data
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/open_research_games.json
          git diff --staged --quiet || git commit -m "Update games data [automated]"
          git push
