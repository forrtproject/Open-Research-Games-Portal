name: Weekly Data Processing

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly at 00:00 UTC every Sunday
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  data-processing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Backwards compatible with a common typo; prefer ORGP_DP_TOKEN.
          token: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4' # Use a specific R version for stability
          install-r: true
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Restore R packages (renv)
        run: |
          set -euo pipefail
          . /etc/os-release
          export RSPM="https://packagemanager.posit.co/cran/__linux__/${VERSION_CODENAME}/latest"
          export RENV_CONFIG_REPOS_OVERRIDE="${RSPM}"
          Rscript --vanilla <<'RS'
          rspm <- Sys.getenv("RSPM")
          if (!nzchar(rspm)) stop("RSPM env var is empty")

          options(
            repos = c(RSPM = rspm, CRAN = "https://cloud.r-project.org"),
            Ncpus = max(1L, parallel::detectCores() - 1L)
          )

          Sys.setenv(USE_BUNDLED_LIBUV = "1")

          if (!requireNamespace("renv", quietly = TRUE)) {
            install.packages("renv", repos = getOption("repos"), dependencies = TRUE)
          }
          if (!requireNamespace("renv", quietly = TRUE)) {
            stop("Failed to install/load renv")
          }

          renv::restore(prompt = FALSE, rebuild = "never")
          RS

      - name: Run data processing
        run: |
          Rscript --vanilla scripts/Open-Research-Games-Portal.R
        env:
          GITHUB_PAT: ${{ secrets.ORGP_DP_TOKEN || secrets.ORGP_DP_TOKEM }} # For googlesheets4 if needed

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/open_research_games.json
          git diff --staged --quiet || git commit -m "Update games data [automated]"
          git push
